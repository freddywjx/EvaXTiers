<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvaXTiers</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="site-bg"></div>
  <div class="site-overlay"></div>

  <div class="topbar">
    <a class="discord-btn" href="https://discord.gg/MyS4V2vEYd" target="_blank" rel="noopener noreferrer">
      Discord
    </a>
  </div>

  <main class="page">
    <header class="hero">
      <h1 class="hero-title">EvaXTiers</h1>
      <p class="subtitle">Minecraft PvP Tierlist</p>
    </header>

    <nav class="kits" id="kits"></nav>

    <section class="leaderboard-section">
      <div class="section-header">
        <h2 id="sectionTitle">Overall Leaderboard</h2>
      </div>

      <div class="search-wrap">
        <input
          id="playerSearch"
          class="search-input"
          type="text"
          placeholder="Search player IGN and press Enter..."
          autocomplete="off"
        />
      </div>

      <div id="leaderboard" class="leaderboard"></div>
    </section>
  </main>

  <div id="playerModalOverlay" class="modal-overlay" aria-hidden="true">
    <div class="player-modal" role="dialog" aria-modal="true" aria-labelledby="playerModalTitle">
      <button id="modalCloseBtn" class="modal-close" type="button" aria-label="Close player profile">×</button>
      <div id="playerModalContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
